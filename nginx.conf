server {
    listen 80;
    server_name _;

    # Frontend (SPA)
    root /var/www/juriscontrol/frontend/dist;
    index index.html;

    # Auth routes — OAuth flows must reach the backend before SPA fallback
    location /auth/ {
        proxy_pass         http://127.0.0.1:3006;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # API proxy
    location /api/ {
        proxy_pass         http://127.0.0.1:3006;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # SPA fallback — must come after /auth/ and /api/ blocks
    location / {
        try_files $uri $uri/ /index.html;
    }

    # File uploads served directly
    location /uploads/ {
        alias /var/www/juriscontrol/backend/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }

    client_max_body_size 50M;
}
