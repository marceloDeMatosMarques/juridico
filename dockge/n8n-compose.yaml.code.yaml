# ============================================
# N8N - Workflow Automation
# ============================================
# URL: https://n8n.m3br.com.br
# Porta local: 5002
# Rede: app_database
# ============================================

version: "3.8"

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    restart: always
    ports:
      - "127.0.0.1:5002:5678"
    networks:
      - app_database
    environment:
      # ============================================
      # SERVIDOR
      # ============================================
      - N8N_HOST=n8n.m3br.com.br
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.m3br.com.br/
      
      # ============================================
      # TIMEZONE
      # ============================================
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - TZ=America/Sao_Paulo
      
      # ============================================
      # SEGURANÇA
      # ============================================
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      
      # ============================================
      # AMBIENTE
      # ============================================
      - NODE_ENV=production
    
    volumes:
      - n8n_data:/home/node/.n8n
      - n8n_files:/files

volumes:
  n8n_data:
  n8n_files:

networks:
  app_database:
    external: true