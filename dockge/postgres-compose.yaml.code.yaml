# ============================================
# PostgreSQL 16 - Banco de Dados
# ============================================
# Porta: 5432
# Usuário: postgres
# Senha: PgEvolution2024
# Banco: evolution
# Rede: app_database
# ============================================

version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: postgres
    command:
      - postgres
      - -c
      - max_connections=1000
    networks:
      - app_database
    environment:
      - POSTGRES_PASSWORD=PgEvolution2024
      - POSTGRES_USER=postgres
      - POSTGRES_DB=evolution
      - TZ=America/Sao_Paulo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  # Rede external compartilhada entre todos os stacks
  # Criar com: docker network create app_database
  # MUDANÇA: era "lex-network" no setup antigo (/opt/lex-services/)
  app_database:
    external: true